<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>html{visibility:hidden;}</style>
    <title>Lera 方法论使用报告</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./database.css" />
  </head>
  <body class="detail-page" style="visibility: hidden">
    <div class="detail-shell">
      <main class="workspace">
        <section class="print-header methodology-print-header">
          <p id="print-brand" class="eyebrow">Metodología Lera</p>
          <h1 id="print-document-title">Informe metodológico</h1>
          <div class="print-header-meta">
            <div>
              <span id="print-project-code-label">Código de proyecto</span>
              <strong id="print-project-code-value">-</strong>
            </div>
            <div>
              <span id="print-dish-name-label">Nombre del plato</span>
              <strong id="print-dish-name-value">-</strong>
            </div>
            <div>
              <span id="print-version-label">Versión</span>
              <strong id="print-version-value">-</strong>
            </div>
            <div>
              <span id="print-stage-label">Etapa actual</span>
              <strong id="print-stage-value">-</strong>
            </div>
          </div>
        </section>

        <header class="topbar">
          <div>
            <p id="brand-eyebrow" class="eyebrow">Lera 方法论</p>
            <h1 id="brand-title">方法论使用报告</h1>
          </div>
          <div class="topbar-actions">
            <button id="back-button" class="secondary-button" type="button">返回上一页</button>
            <button id="print-report-button" class="secondary-button" type="button">保存 PDF</button>
            <a id="home-link" href="../index.html" class="secondary-button nav-link">返回主页</a>
            <a id="back-list-link" href="./methodology-list.html" class="secondary-button nav-link">返回方法论列表</a>
          </div>
        </header>

        <section class="dashboard-grid">
          <article class="dashboard-card">
            <h3 id="meta-title">基础信息</h3>
            <div id="methodology-report-meta" class="dashboard-fields"></div>
          </article>
        </section>

        <section id="report-content-section" class="main-panel">
          <div class="panel-header">
            <div>
              <p id="content-eyebrow" class="eyebrow">阶段记录</p>
              <h3 id="content-title">方法论内容</h3>
            </div>
          </div>
          <div id="methodology-report-content" class="catalog-list"></div>
          <div id="methodology-report-empty" class="empty-state">未找到方法论记录。</div>
        </section>

        <section id="report-changes-section" class="main-panel">
          <div class="panel-header">
            <div>
              <p id="changes-eyebrow" class="eyebrow">修改留痕</p>
              <h3 id="changes-title">进行过的修改</h3>
            </div>
          </div>
          <div id="methodology-report-rollbacks" class="catalog-list"></div>
        </section>

        <section id="report-tools-section" class="main-panel">
          <div class="panel-header">
            <div>
              <p id="tools-eyebrow" class="eyebrow">工具使用</p>
              <h3 id="tools-title">工具使用说明</h3>
            </div>
          </div>
          <div id="methodology-report-tools" class="catalog-list"></div>
        </section>
      </main>
    </div>

    <script src="../desktop-client.js"></script>
    <script src="./methodology-report.js"></script>
  </body>
</html>
