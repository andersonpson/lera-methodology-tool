<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lera · Registros metodológicos</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./database.css" />
  </head>
  <body>
    <div class="app-shell database-shell">
      <main class="workspace">
        <header class="topbar">
          <div>
            <p id="brand-eyebrow" class="eyebrow">Metodología Lera</p>
            <h1 id="brand-title">Listado metodológico</h1>
            <p id="top-eyebrow" class="eyebrow">Base de datos general</p>
            <h2 id="top-title">Registros metodológicos</h2>
          </div>
          <div class="topbar-actions">
            <button id="back-button" class="secondary-button" type="button">Volver</button>
            <a id="home-link" href="../index.html" class="secondary-button nav-link">Inicio</a>
            <a id="back-catalog-link" href="./catalog.html" class="secondary-button nav-link">Base de datos</a>
          </div>
        </header>

        <section class="dashboard-grid">
          <article class="dashboard-card">
            <h3 id="snapshot-title">Resumen metodológico</h3>
            <div class="metrics-grid">
              <div class="metric-card">
                <span id="total-count-label" class="support-copy">Número de registros</span>
                <strong id="methodology-total-count">0</strong>
              </div>
              <div class="metric-card">
                <span id="latest-updated-label" class="support-copy">Última actualización</span>
                <strong id="methodology-latest-updated">-</strong>
              </div>
            </div>
          </article>
        </section>

        <section class="main-panel">
          <div class="panel-header">
            <div>
              <p id="section-eyebrow" class="eyebrow">Consulta</p>
              <h3 id="section-title">Listado metodológico</h3>
            </div>
          </div>
          <div class="catalog-toolbar">
            <label>
              <span id="search-label">Buscar por nombre / código</span>
              <input id="methodology-search-input" type="text" placeholder="" />
            </label>
          </div>

          <div id="methodology-list" class="catalog-list"></div>
          <div id="methodology-empty" class="empty-state">Todavía no hay registros.</div>
        </section>
      </main>
    </div>

    <script src="../desktop-client.js"></script>
    <script src="./methodology-list.js"></script>
  </body>
</html>
