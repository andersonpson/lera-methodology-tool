<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lera 方法论使用列表</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./database.css" />
  </head>
  <body style="visibility: hidden">
    <div class="app-shell database-shell">
      <main class="workspace">
        <header class="topbar">
          <div>
            <p id="brand-eyebrow" class="eyebrow">Lera 方法论</p>
            <h1 id="brand-title">方法论使用列表</h1>
            <p id="top-eyebrow" class="eyebrow">数据库总列表</p>
            <h2 id="top-title">方法论记录</h2>
          </div>
          <div class="topbar-actions">
            <button id="back-button" class="secondary-button" type="button">返回上一页</button>
            <a id="home-link" href="../index.html" class="secondary-button nav-link">返回主页</a>
            <a id="back-catalog-link" href="./catalog.html" class="secondary-button nav-link">总表</a>
          </div>
        </header>

        <section class="dashboard-grid">
          <article class="dashboard-card">
            <h3 id="snapshot-title">方法论快照</h3>
            <div class="metrics-grid">
              <div class="metric-card">
                <span id="total-count-label" class="support-copy">当前记录数</span>
                <strong id="methodology-total-count">0</strong>
              </div>
              <div class="metric-card">
                <span id="latest-updated-label" class="support-copy">最近编辑</span>
                <strong id="methodology-latest-updated">-</strong>
              </div>
            </div>
          </article>
        </section>

        <section class="main-panel">
          <div class="panel-header">
            <div>
              <p id="section-eyebrow" class="eyebrow">访问与检索</p>
              <h3 id="section-title">方法论目录</h3>
            </div>
          </div>
          <div class="catalog-toolbar">
            <label>
              <span id="search-label">搜索名称 / 编码</span>
              <input id="methodology-search-input" type="text" placeholder="" />
            </label>
          </div>

          <div id="methodology-list" class="catalog-list"></div>
          <div id="methodology-empty" class="empty-state">暂无记录</div>
        </section>
      </main>
    </div>

    <script src="../desktop-client.js"></script>
    <script src="./methodology-list.js"></script>
  </body>
</html>
